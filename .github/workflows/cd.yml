name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    env:
      SG_ID: sg-07ea36c7bf5e59f5c

    steps:
      - name: Get runner IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Open SSH for runner IP
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ip.outputs.ip }}/32"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest code (for docker-compose.prod.yml, .env, prisma migrations)
            cd ~/dhibob
            git pull --ff-only origin main

            # Log in to GHCR and pull pre-built image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/dorikafri/dhibob:latest

            # Tag it as local so docker-compose uses it
            docker tag ghcr.io/dorikafri/dhibob:latest dhibob-app:local

            # Apply DB migrations and restart
            docker compose -f docker-compose.prod.yml run --rm app npx prisma db push
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Deploy done."

      - name: Revoke SSH for runner IP
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ip.outputs.ip }}/32"
